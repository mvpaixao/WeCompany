{% extends "base.html" %}
{% block title %}Criar conta{% endblock %}

{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow border-0" style="width: 400px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-buildings text-primary" style="font-size:2.5rem;"></i>
        <h4 class="mt-2 fw-bold">Criar conta</h4>
        <p class="text-muted small">AI Company Simulator</p>
      </div>

      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label small fw-semibold">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   class="form-control {% if field.errors %}is-invalid{% endif %}"
                   {% if field.value %}value="{{ field.value }}"{% endif %}
                   {% if field.field.required %}required{% endif %}>
            {% for error in field.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 mt-2">Criar conta</button>
      </form>
      <div class="text-center mt-3 small">
        Já tem conta? <a href="{% url 'login' %}">Entrar</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
